# Headless Notify — single web service, no database, env-only configuration.
#
# Deploy: README "Deploy headless" button, then set Blueprint path to render-headless.yaml.
#
# All application env vars use sync: false so Render prompts for them when you apply
# the blueprint (same keys as apps/headless/.env.example).
#
# Optional: EMAIL_RECIPIENTS and SLACK_WEBHOOK_URLS — leave blank if unused.
# When EMAIL_RECIPIENTS is empty, email provider variables are not required (Slack-only OK).
#
# PORT is injected by Render automatically.

services:
  - type: web
    name: notify-headless
    runtime: docker
    dockerfilePath: ./apps/headless/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Webhook + subscription (required) ───────────────────────────────────
      - key: WEBHOOK_TOKEN
        sync: false
      - key: SUBSCRIBE_STATUSES
        sync: false

      # ── Destinations (optional — leave empty in dashboard if unused) ────────
      # Headless treats missing/empty as no email / no Slack.
      - key: EMAIL_RECIPIENTS
        sync: false
      - key: SLACK_WEBHOOK_URLS
        sync: false

      # ── Email via use-email (required when EMAIL_RECIPIENTS is non-empty) ─────
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PROVIDER_KEY
        sync: false
