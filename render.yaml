# Render Blueprint — deploys two services from this monorepo:
#
#   notify-api   Web Service  (Docker, Hono + tRPC)
#   notify-web   Static Site  (Vite, React SPA)
#
# One-click deploy: https://render.com/deploy?repo=<your-github-url>
#
# Manual steps required after first deploy:
#   1. Set DATABASE_URL to your Turso / remote LibSQL URL in the dashboard.
#      (A local file URL works for a single instance but is not durable.)
#   2. Set CORS_ORIGIN to the URL of the deployed notify-web static site.
#      Render assigns it a URL like https://notify-web.onrender.com — copy
#      that exact origin (no trailing slash) into notify-api's CORS_ORIGIN.
#   3. Set all SMTP_* variables so email delivery works.
#   4. Run the first database migration from the Render Shell (notify-api):
#        pnpm db:migrate
#      or via the dashboard one-off job after deployment.

services:
  # ── API (Hono + tRPC) ────────────────────────────────────────────────────────
  - type: web
    name: notify-api
    runtime: docker
    dockerfilePath: ./apps/dashboard/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database ─────────────────────────────────────────────────────────────
      # Set to a remote LibSQL / Turso URL for durability.
      # Example: libsql://your-db.turso.io
      - key: DATABASE_URL
        sync: false

      # ── Auth ─────────────────────────────────────────────────────────────────
      - key: BETTER_AUTH_SECRET
        generateValue: true

      # TODO: replace with https://notify-api.onrender.com after first deploy
      - key: BETTER_AUTH_URL
        value: https://notify-api.onrender.com

      # TODO: replace with https://notify-web.onrender.com after first deploy
      - key: CORS_ORIGIN
        value: https://notify-web.onrender.com

      # ── Webhook ───────────────────────────────────────────────────────────────
      - key: WEBHOOK_TOKEN
        generateValue: true

      # ── SMTP (Nodemailer) ─────────────────────────────────────────────────────
      # TODO: replace with real values when you set up email
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@example.com

      # ── Optional ──────────────────────────────────────────────────────────────
      - key: ALLOWED_EMAIL_DOMAINS
        sync: false

  # ── Web (React SPA) ──────────────────────────────────────────────────────────
  # Static sites in Render Blueprints use type: web with runtime: static.
  - type: web
    runtime: static
    name: notify-web
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter web build
    staticPublishPath: apps/dashboard/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Points the SPA at the API.
      # Set to: https://notify-api.onrender.com  (or your custom domain)
      - key: VITE_SERVER_URL
        sync: false
